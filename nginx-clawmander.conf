map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Route root-path WebSocket upgrades to OpenClaw Gateway.
# The Android app connects to wss://host:port with no path support,
# so WS upgrades at / must reach the gateway rather than Next.js.
map $http_upgrade $root_backend {
    websocket http://127.0.0.1:18789;
    default   http://127.0.0.1:3000;
}

server {
    listen 443 ssl;
    server_name scottgl-aipc.taile589de.ts.net;

    ssl_certificate     /etc/ssl/tailscale/scottgl-aipc.taile589de.ts.net.crt;
    ssl_certificate_key /etc/ssl/tailscale/scottgl-aipc.taile589de.ts.net.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Matrix Synapse (uses /_matrix/ and /_synapse/ paths)
    location /_matrix/ {
        proxy_pass http://127.0.0.1:8008;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        client_max_body_size 50M;
        proxy_read_timeout 600;
    }

    location /_synapse/ {
        proxy_pass http://127.0.0.1:8008;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        client_max_body_size 50M;
        proxy_read_timeout 600;
    }

    location /.well-known/matrix/ {
        proxy_pass http://127.0.0.1:8008;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }

    # SSE endpoint — needs unbuffered long-lived connection
    location /api/sse/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
        gzip off;
        add_header X-Accel-Buffering no;
    }

    # Backend API (port 3001)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
    }

    # Next.js static assets — content-hashed, cache aggressively
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # OpenClaw Control UI + WS (served under basePath)
    location /openclaw/ {
        proxy_pass http://127.0.0.1:18789/openclaw/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600;
    }

    # Frontend (Next.js / Clawmander PWA)
    # WebSocket upgrades at / are routed to OpenClaw Gateway (for Android app
    # which connects to wss://host:port with no path). Normal HTTP goes to Next.js.
    location / {
        proxy_pass $root_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600;
    }
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name scottgl-aipc.taile589de.ts.net;
    return 301 https://$host$request_uri;
}
